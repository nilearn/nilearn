---
# Compare gallery example images ('sphx_glr_plot_*.png') between the
# 'stable' and 'dev' builds of the doc published on nilearn.github.io.
# Gives an idea of how much example outputs visually change across
# nilearn versions. See https://github.com/nilearn/nilearn/issues/6342
#
# Comparison is done via maint_tools/compare_doc_images.js
###
name: compare doc images

on:
    # TODO drop the pull_request trigger once this workflow has been
    # debugged; workflow_dispatch and schedule alone should be enough
    # afterwards.
    pull_request:
        branches:
        -   '*'

    schedule:
        # Uses the cron schedule for github actions
        # https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#schedule
        #     ┌───────────── minute (0 - 59)
        #     │ ┌───────────── hour (0 - 23)
        #     │ │ ┌───────────── day of the month (1 - 31)
        #     │ │ │ ┌───────────── month (1 - 12 or JAN-DEC)
        #     │ │ │ │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
        #     │ │ │ │ │
        #     │ │ │ │ │
        #     │ │ │ │ │
        #     * * * * *
        # Runs at 00:00, on day 1 of every 3rd month
    -   cron: 0 0 1 */3 *

    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    FORCE_COLOR: true

jobs:

    compare_doc_images:
        if: github.repository == 'nilearn/nilearn'

        name: Compare stable vs dev doc images

        runs-on: ubuntu-latest

        steps:
        -   uses: actions/checkout@v7

        -   uses: actions/setup-node@v6
            with:
                node-version: 24

        -   name: Install node dependencies
            run: npm install

        -   name: Clone nilearn.github.io (sparse, dev/_images + stable/_images only)
            run: |
                git clone --depth 1 --filter=blob:none --sparse \
                    https://github.com/nilearn/nilearn.github.io.git \
                    tmp/nilearn.github.io
                git -C tmp/nilearn.github.io sparse-checkout set dev/_images stable/_images

        -   name: Compare doc images
            id: compare
            continue-on-error: true
            run: node maint_tools/compare_doc_images.js

        -   name: Upload diff images
            if: success() || failure()
            uses: actions/upload-artifact@v7
            with:
                name: doc-image-diffs
                path: tmp/doc_image_diffs/*.png
                if-no-files-found: ignore

        -   name: Create issue
            if: ${{ github.event_name == 'schedule' && steps.compare.outcome != 'success' }}
            uses: JasonEtco/create-an-issue@v2.9.2
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run_id: ${{ github.run_id }}
                repository: ${{ github.repository }}
                workflow_name: COMPARE DOC IMAGES
            with:
                filename: .github/workflow_failure.md
                update_existing: true
                search_existing: open

        -   name: Return failure
            if: ${{ steps.compare.outcome != 'success' }}
            run: exit 1
