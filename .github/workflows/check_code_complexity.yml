---
# Check that the cognitive complexity of the code has not increased.
#
# Uses complexipy (https://github.com/rohaquinlop/complexipy) to compute
# the cognitive complexity of each function in ``nilearn`` and compares it
# against the base branch of the pull request via ``--diff``.
#
# ``--ratchet`` makes the check fail only when a function's complexity
# regresses past MAX_COMPLEXITY_ALLOWED: functions that are already above
# the threshold but do not get worse are still allowed, and improvements
# always pass.
#
###
name: Complexity Check

on:
    pull_request:
        branches:
        -   '*'
        paths:
        -   nilearn/**/*
        -   .github/workflows/check_code_complexity.yml

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    # Force to use color
    FORCE_COLOR: true
    MAX_COMPLEXITY_ALLOWED: 25

jobs:
    check:
        if: github.repository == 'nilearn/nilearn'
        runs-on: ubuntu-latest
        steps:
        -   name: Checkout
            uses: actions/checkout@v7
            with:
                # Need the base branch history for complexipy to diff against.
                fetch-depth: 0

        -   name: Install the latest version of uv
            uses: astral-sh/setup-uv@v7
            with:
                python-version: 3.x

        -   name: Install complexipy
            run: uv tool install "complexipy>=5.3.0"

        -   name: Check code complexity against the base branch
            run: |
                complexipy nilearn \
                    --diff ${{ github.event.pull_request.base.sha }} \
                    --ratchet \
                    --max-complexity-allowed ${{ env.MAX_COMPLEXITY_ALLOWED }}
